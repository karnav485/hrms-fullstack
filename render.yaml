# Render Blueprint — HRMS Lite Backend + PostgreSQL
# Deploy: Dashboard → New → Blueprint → Connect this repo

databases:
  - name: hrms-db
    plan: free
    databaseName: hrms_db
    user: hrms_user

services:
  - type: web
    name: hrms-backend
    runtime: python
    plan: free
    rootDir: backend_hrms
    buildCommand: "./build.sh"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-db
          property: connectionURI
      - key: FRONTEND_URL
        value: https://your-netlify-app.netlify.app
      - key: PYTHON_VERSION
        value: "3.11.12"
